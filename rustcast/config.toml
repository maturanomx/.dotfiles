toggle_hotkey = "ALT+SPACE"
clipboard_hotkey = "SUPER+SHIFT+C"
event_duration = 60
main_page = "blank"
start_at_login = true
placeholder = "Time to be productive!"
search_url = "https://duckduckgo.com/search?q=%s"
haptic_feedback = false
cbhist = true
show_trayicon = true
shells = []
search_dirs = ["~"]
log_path = "/tmp/rustcast.log"
debounce_delay = 300
auto_update = true

[buffer_rules]
clear_on_hide = true
clear_on_enter = true

[theme]
text_color = [
    0.95,
    0.95,
    0.96,
]
background_color = [
    0.0,
    0.0,
    0.0,
]
blur = false
show_icons = true
show_scroll_bar = false

